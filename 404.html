<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ojasw Kant - Portfolio</title>
    <script>
      // Single Page App GitHub Pages redirect trick.
      // When GitHub Pages serves a 404 for a route like /nidar-2025,
      // this page redirects back to index.html with the path encoded
      // as a query string, which the SPA then reads and navigates to.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
